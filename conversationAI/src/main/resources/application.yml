spring:
  profiles:
    active: local
  datasource:
    url: jdbc:mysql://localhost:3306/conversation_ai?serverTimezone=Asia/Seoul&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: placeholder
    password: placeholder
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  task:
    scheduling:
      enabled: true

jwt:
  secret: placeholder
  expiration: 3600000

gemini:
  api-key: placeholder
  model: gemini-2.5-flash-lite

zonos:
  api-key: placeholder

openai:
  api-key: placeholder

storage:
  base-path: /tmp/conversationai
  base-url: http://localhost:8080/files